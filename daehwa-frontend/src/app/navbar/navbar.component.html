<nav class="navbar navbar-expand-lg navbar-daehwa shadow-sm px-3">
  
  <a class="navbar-brand d-flex align-items-center gap-3"
     [routerLink]="usuario ? (usuario.rol === 'L' ? '/logopeda' : '/familiar') : '/login'">
    <div class="logo-wrapper">
      <img src="/img/logo.png" alt="logo" class="logo-img">
    </div>
    <span class="brand-text">DAEHWA</span>
  </a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarReactivo">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarReactivo">

    @if (usuario) {
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item me-3 d-flex align-items-center">
          <span class="usuario-nombre">{{ usuario.nombre }}</span>
          <span class="badge rol-badge ms-2">{{ usuario.rol }}</span>
        </li>

        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm" (click)="logout()">Cerrar sesión</button>
        </li>
      </ul>
    } @else {
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="btn btn-light btn-sm" routerLink="/login">Iniciar sesión</a>
        </li>
      </ul>
    }

  </div>
</nav>
