<nav class="navbar navbar-expand-lg navbar-daehwa px-3">
  <a class="navbar-brand d-flex align-items-center" [routerLink]="usuario ? (usuario.rol === 'L' ? '/logopeda' : '/familiar') : '/login'">
    <img src="/img/logo.png" alt="logo" height="40" class="me-2">
    <span class="fw-bold">DAEHWA</span>
  </a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarReactivo">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarReactivo">

    @if (usuario) {
      <ul class="navbar-nav ms-auto">

        <li class="nav-item d-flex align-items-center me-3">
          <span class="usuario-info">
            {{ usuario.nombre }}
            <span class="badge rol-badge ms-1">{{ usuario.rol }}</span>
          </span>
        </li>
        <li class="nav-item">
          <button class="btn btn-logout btn-sm" (click)="logout()">Cerrar sesión</button>
        </li>

      </ul>
    } @else {
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="btn btn-login btn-sm" routerLink="/login">Iniciar sesión</a>
        </li>
      </ul>
    }

  </div>
</nav>
