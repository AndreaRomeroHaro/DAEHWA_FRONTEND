<div class="container mt-4">
    <h2 class="mb-4">Gestión de Citas</h2>

    <div class="card shadow-sm mb-4">

        <h4 class="mt-4 mb-3">Citas programadas</h4>

        <ul class="list-group" id="lista-citas">
            @for(cita of citas;track cita.id_cita){
                <li class="list-group-item">
                    <div class="d-flex justify-content-between aling-items-center">
                    </div>
                    @if(detalleCita===cita.id_cita){
                        <div class="mt-3 border-top pt-3">
                            <p><strong>Inicio:</strong>{{cita.fecha_inicio | date:'dd/MM/yyyy HH:mm'}}</p>
                            <p><strong>Fin:</strong>{{cita.fecha_fin | date:'dd/MM/yyyy HH:mm'}}</p>
                            <p><strong>Estado:</strong>{{cita.estado}}</p>
                        </div>
                    }
                </li>
            }
        </ul>
    </div>
</div>
