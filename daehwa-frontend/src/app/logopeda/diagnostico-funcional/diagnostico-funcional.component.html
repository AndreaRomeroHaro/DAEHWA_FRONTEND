<div class="container mt-4">
    <h2 class="mb-4">Diagnóstico funcional</h2>
    
    <div class="card-shadow-sm">
        <div class="card-body">
            
            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" [(ngModel)]="diagnostico.fecha">
            </div>

            <div class="mb-3">
                <label class="form-label">Diagnóstico Funcional</label>
                <textarea class="form-control" rows="4" [(ngModel)]="diagnostico.diagnostico_funcional"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Recomendaciones</label>
                <textarea class="form-control" rows="3" [(ngModel)]="diagnostico.recomendaciones"></textarea>
            </div>

            <button class="btn btn-primary" (click)="guardarDiagnostico()">Guardar diagnóstico</button>
        </div>
    </div>
</div>
